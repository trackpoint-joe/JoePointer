<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tri-State AI Intelligence Dashboard | Joe Pointer</title>
    <meta http-equiv="refresh" content="2;url=https://tristate-ai-dashboard-production.up.railway.app/">
    <meta name="description" content="AI Intelligence Dashboard prototype designed for Tri-State Generation & Transmission Association. Sentiment analysis, member retention risk, price forecasting, and AI document Q&A.">
    <style>
        :root { --ts-blue: #005a9c; --ts-dark: #003d6b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--ts-dark), var(--ts-blue));
            color: white; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .container {
            text-align: center; padding: 3rem; max-width: 600px;
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        p { font-size: 1.1rem; opacity: 0.85; margin-bottom: 2rem; }
        .loading {
            display: inline-block; width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        a {
            color: white; background: rgba(255,255,255,0.15);
            padding: 0.75rem 2rem; border-radius: 6px;
            text-decoration: none; font-weight: 600;
            border: 1px solid rgba(255,255,255,0.3);
            transition: background 0.2s;
        }
        a:hover { background: rgba(255,255,255,0.25); }
        .credit { margin-top: 3rem; font-size: 0.8rem; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loading"></div>
        <h1>Tri-State AI Intelligence Dashboard</h1>
        <p>Loading the live dashboard...</p>
        <a href="https://tristate-ai-dashboard-production.up.railway.app/">Click here if not redirected</a>
        <div class="credit">Designed by Joe Pointer | joepointer.com</div>
    </div>
</body>
</html>
